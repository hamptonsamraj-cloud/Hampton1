<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Engineering Stress & Strain Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1f4037, #99f2c8);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 400px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 8px;
            margin: 8px 0 15px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #1f4037;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #14532d;
        }

        .result {
            margin-top: 15px;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Stress & Strain Calculator</h2>

    <label>Force (N)</label>
    <input type="number" id="force" placeholder="Enter Force">

    <label>Area (mm²)</label>
    <input type="number" id="area" placeholder="Enter Area">

    <label>Original Length (mm)</label>
    <input type="number" id="length" placeholder="Enter Original Length">

    <label>Change in Length (mm)</label>
    <input type="number" id="deltaLength" placeholder="Enter Change in Length">

    <button onclick="calculate()">Calculate</button>

    <div class="result" id="output"></div>
</div>

<script>
    function calculate() {
        let force = parseFloat(document.getElementById("force").value);
        let area = parseFloat(document.getElementById("area").value);
        let length = parseFloat(document.getElementById("length").value);
        let deltaLength = parseFloat(document.getElementById("deltaLength").value);

        if (!force || !area || !length || !deltaLength) {
            document.getElementById("output").innerHTML = "Please enter all values.";
            return;
        }

        let stress = force / area;
        let strain = deltaLength / length;

        document.getElementById("output").innerHTML =
            "Stress = " + stress.toFixed(3) + " N/mm²<br>" +
            "Strain = " + strain.toFixed(6);
    }
</script>

</body>
</html>
